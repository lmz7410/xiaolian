			<body class="is-preload">
<!-- Password Guard -->
<div id="password-guard" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;justify-content:center;align-items:center;z-index:9999;">
  <div style="background:#1a1a2e;padding:2em 3em;border-radius:12px;text-align:center;max-width:400px;width:90%;">
    <h2 style="color:#fff;margin-bottom:0.5em;">🔒 私密短链服务</h2>
    <p style="color:#aaa;margin-bottom:1.5em;font-size:0.9em;">请输入访问口令</p>
    <input type="password" id="guard-password" placeholder="输入口令..." style="width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#0d0d1a;color:#fff;font-size:16px;box-sizing:border-box;margin-bottom:1em;" />
    <button id="guard-submit" style="width:100%;padding:12px;border-radius:8px;border:none;background:#4a6cf7;color:#fff;font-size:16px;cursor:pointer;">确认</button>
    <p id="guard-error" style="color:#ff4d4f;margin-top:1em;display:none;">口令错误，请重试</p>
  </div>
</div>
<script>
(function(){
  const guard = document.getElementById('password-guard');
  const input = document.getElementById('guard-password');
  const submit = document.getElementById('guard-submit');
  const error = document.getElementById('guard-error');
  // Simple hash check - password: xiaolian2024
  const correctHash = '7b8a0e6e8d5c3a1f9e2d4b6c0a8f3e7d1c5b9a2e6f0d4c8b3a7e1d5c9b2f6a0e';
  
  function checkPassword() {
    const pwd = input.value;
    // Simple string comparison hash
    let hash = 0;
    for(let i=0;i<pwd.length;i++){hash=((hash<<5)-hash)+pwd.charCodeAt(i);hash|=0;}
    if(String(hash) === '-1068474682' || pwd === 'xiaolian2024') {
      guard.style.display = 'none';
      localStorage.setItem('guard_passed','1');
    } else {
      error.style.display = 'block';
      input.value = '';
    }
  }
  
  if(localStorage.getItem('guard_passed') === '1') {
    guard.style.display = 'none';
  }
  
  submit.addEventListener('click', checkPassword);
  input.addEventListener('keypress', function(e){ if(e.key==='Enter') checkPassword(); });
  input.focus();
})();
</script>

				<script>
					(function() {
						"use strict";
						function setBackgroundImage() {
							const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
							const apiUrl = isMobile ? 'https://bing.biturl.top/?resolution=1366&format=json&index=0&mkt=zh-CN' : 'https://bing.biturl.top/?resolution=UHD&format=json&index=0&mkt=zh-CN';
							const fallbackUrl = isMobile ? 'images/Mobile.jpg' : 'images/1.jpg';

							fetch(apiUrl)
								.then(response => response.json())
								.then(data => {
									const imageUrl = data.url;
									const img = new Image();
									img.src = imageUrl;
									img.onload = function() {
										document.body.style.backgroundImage = `url('${imageUrl}')`;
									};
									img.onerror = function() {
										document.body.style.backgroundImage = `url('${fallbackUrl}')`;
									};

									const aboutCopyrightElement = document.getElementById('bing-copyright');
									if (aboutCopyrightElement) {
										aboutCopyrightElement.innerHTML = `背景版权: <a href="${data.copyright_link}" target="_blank">${data.copyright}</a>`;
									}
								})
								.catch(error => {
									console.error('Error fetching background image URL:', error);
									document.body.style.backgroundImage = `url('${fallbackUrl}')`;
									const aboutCopyrightElement = document.getElementById('bing-copyright');
									if (aboutCopyrightElement) {
										aboutCopyrightElement.innerHTML = '';
									}
								});

							document.body.style.backgroundSize = 'cover';
							document.body.style.backgroundPosition = 'center center';
							document.body.style.backgroundAttachment = 'fixed';
						}
						setBackgroundImage();
					})();
				</script>
